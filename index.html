<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMessage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/segoe-ui-4" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let selectedContactId = null;
        let animationsEnabled = true;
        let unsubMessages = null;

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('my-id').innerText = user.uid;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), {
                    uid: user.uid,
                    name: `User ${user.uid.substring(0, 4)}`,
                    status: 'online',
                    lastSeen: serverTimestamp()
                }, { merge: true });
                listenToContacts();
            }
        });

        function listenToContacts() {
            if (!currentUser) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = snap.docs
                    .map(doc => doc.data())
                    .filter(u => u.uid !== currentUser?.uid)
                    .map(u => `
                        <div class="contact-item" onclick="selectContact('${u.uid}', '${u.name}')">
                            <div class="w-12 h-12 bg-[#008a00] flex-shrink-0"></div>
                            <div class="flex flex-col">
                                <span class="text-xl font-light">${u.name}</span>
                                <span class="text-xs opacity-50 uppercase">Online</span>
                            </div>
                        </div>
                    `).join('');
            }, (err) => console.error(err));
        }

        window.copyId = () => {
            const idText = document.getElementById('my-id').innerText;
            const tempInput = document.createElement("input");
            tempInput.value = idText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerText;
            btn.innerText = "ГОТОВО";
            btn.style.color = "#00aba9";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "white";
            }, 2000);
        };

        window.searchUser = async () => {
            const searchId = document.getElementById('search-input').value.trim();
            if (!searchId) return;

            const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', searchId));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                toggleSidebar('side-search', false);
                navigate('msg');
                selectContact(userData.uid, userData.name);
            } else {
                const errorBox = document.getElementById('search-error');
                errorBox.innerText = "Пользователь не найден";
                errorBox.classList.remove('hidden');
                setTimeout(() => errorBox.classList.add('hidden'), 3000);
            }
        };

        window.selectContact = (uid, name) => {
            if (!currentUser) return;
            selectedContactId = uid;
            document.getElementById('chat-title').innerText = name;
            const chatId = [currentUser.uid, uid].sort().join('_');
            
            if (unsubMessages) unsubMessages();
            
            unsubMessages = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'chats', chatId, 'messages'), (snap) => {
                const area = document.getElementById('msg-area');
                area.innerHTML = snap.docs
                    .map(d => d.data())
                    .sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0))
                    .map(m => `
                        <div class="msg ${m.senderId === currentUser.uid ? 'sent' : 'received'}">
                            ${m.text}
                        </div>
                    `).join('');
                area.scrollTop = area.scrollHeight;
            }, (err) => console.error(err));
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msg-input');
            if (!input.value.trim() || !selectedContactId || !currentUser) return;
            const chatId = [currentUser.uid, selectedContactId].sort().join('_');
            
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chats', chatId, 'messages'), {
                text: input.value,
                senderId: currentUser.uid,
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        window.navigate = (page) => {
            const current = document.querySelector('.page:not(.hidden)');
            const target = document.getElementById(page + '-page');
            if (current === target) return;

            current.style.animation = 'winExit 0.3s forwards';
            setTimeout(() => {
                current.classList.add('hidden');
                target.classList.remove('hidden');
                target.style.animation = 'winEnter 0.4s forwards';
            }, 300);
        };

        window.toggleAnim = () => {
            animationsEnabled = !animationsEnabled;
            const track = document.querySelector('#anim-toggle .sw-track');
            if(animationsEnabled) track.classList.add('active');
            else track.classList.remove('active');
        };

        window.toggleSidebar = (id, state) => {
            const sidebar = document.getElementById(id);
            if (state) sidebar.classList.add('active');
            else sidebar.classList.remove('active');
        };

        window.onload = () => {
            // Исправленный обработчик нажатия (Tilt effect)
            document.addEventListener('mousedown', (e) => {
                if (!animationsEnabled) return;
                const el = e.target.closest('.tile, .win-btn, .contact-item, .charm, .back-btn, .sw-track');
                if (!el) return;
                
                const r = el.getBoundingClientRect();
                const x = e.clientX - r.left, y = e.clientY - r.top;
                const tx = (y - r.height/2) / (r.height/2) * -10;
                const ty = (x - r.width/2) / (r.width/2) * 10;
                
                el.style.transition = 'transform 0.1s ease-out';
                el.style.transform = `perspective(1000px) rotateX(${tx}deg) rotateY(${ty}deg) scale(0.97)`;
            });

            document.addEventListener('mouseup', () => {
                document.querySelectorAll('.tile, .win-btn, .contact-item, .charm, .back-btn, .sw-track').forEach(el => {
                    el.style.transition = 'transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1)';
                    el.style.transform = '';
                });
            });

            const charms = document.getElementById('charms');
            document.addEventListener('mousemove', (e) => {
                if(e.clientX > window.innerWidth - 20) charms.classList.add('active');
                if(e.clientX < window.innerWidth - 160) charms.classList.remove('active');
            });
        };
    </script>
    <style>
        body { background: #004687; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; user-select: none; }
        @keyframes winEnter { from { opacity: 0; transform: perspective(1000px) rotateY(10deg) scale(1.1); } to { opacity: 1; transform: perspective(1000px) rotateY(0) scale(1); } }
        @keyframes winExit { to { opacity: 0; transform: perspective(1000px) rotateY(-10deg) scale(0.9); } }
        
        .page { position: absolute; inset: 0; padding: 80px 10%; box-sizing: border-box; z-index: 10; }
        h1 { font-size: 80px; font-weight: 100; margin-bottom: 40px; }
        
        .tiles { display: grid; grid-template-columns: repeat(auto-fill, 160px); grid-auto-rows: 160px; gap: 10px; }
        .tile { background: #00aba9; padding: 15px; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; position: relative; z-index: 20; }
        .tile:hover { outline: 3px solid rgba(255,255,255,0.4); }
        .tile.wide { grid-column: span 2; }
        .tile svg { width: 50px; height: 50px; margin-bottom: auto; pointer-events: none; }
        
        .chat-layout { display: flex; height: calc(100vh - 300px); gap: 50px; }
        .contact-list { width: 350px; overflow-y: auto; }
        .contact-item { display: flex; align-items: center; gap: 15px; padding: 10px; cursor: pointer; margin-bottom: 5px; position: relative; z-index: 20; }
        .contact-item:hover { background: rgba(255,255,255,0.1); }
        
        .msg-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 10px 20px; font-size: 20px; max-width: 70%; }
        .msg.received { background: rgba(255,255,255,0.1); align-self: flex-start; }
        .msg.sent { background: #7e3878; align-self: flex-end; }
        
        .win-input { background: white; color: black; padding: 12px; border: none; width: 100%; outline: none; font-size: 18px; user-select: text; }
        .win-btn { background: #222; border: 2px solid white; color: white; padding: 8px 30px; cursor: pointer; text-transform: lowercase; position: relative; z-index: 20; }
        
        .charms { position: fixed; right: -100px; top: 0; height: 100vh; width: 90px; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; transition: 0.2s; pointer-events: auto; }
        .charms.active { right: 0; }
        .charm { text-align: center; color: #555; cursor: pointer; transition: 0.2s; pointer-events: auto; }
        .charm:hover { color: white; }
        
        .overlay { position: fixed; right: -400px; top: 0; height: 100vh; width: 380px; background: #1f1f1f; z-index: 2000; padding: 60px 30px; transition: 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.5); pointer-events: auto; }
        .overlay.active { right: 0; }
        
        .back-btn { width: 40px; height: 40px; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 30px; position: relative; z-index: 30; }
        
        .sw-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .sw-label { font-size: 14px; font-weight: bold; text-transform: uppercase; color: #aaa; }
        .sw-track { width: 55px; height: 25px; border: 2px solid #666; position: relative; cursor: pointer; pointer-events: auto; }
        .sw-track.active { background: #00aba9; border-color: #00aba9; }
        .sw-thumb { width: 12px; height: 12px; background: white; position: absolute; top: 5px; left: 5px; transition: 0.2s; pointer-events: none; }
        .sw-track.active .sw-thumb { left: 34px; }
        
        .disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

    <div class="page" id="start-page">
        <h1>MMessage</h1>
        <div class="tiles">
            <div class="tile wide" style="background: #7e3878;" onclick="navigate('msg')">
                <svg viewBox="0 0 24 24" fill="white"><path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/></svg>
                <span class="text-2xl font-light">Сообщения</span>
            </div>
            <div class="tile" style="background: #008a00;" onclick="toggleSidebar('side-search', true)">
                <svg viewBox="0 0 24 24" fill="white"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                <span class="text-2xl font-light">Поиск</span>
            </div>
            <div class="tile" style="background: #d24726;" onclick="toggleSidebar('side-settings', true)">
                <svg viewBox="0 0 24 24" fill="white"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.68 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
                <span class="text-2xl font-light">Настройки</span>
            </div>
        </div>
    </div>

    <div class="page hidden" id="msg-page">
        <div class="flex items-center mb-10">
            <div class="back-btn mr-10" onclick="navigate('start')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M15 19l-7-7 7-7"/></svg>
            </div>
            <h1>Сообщения</h1>
        </div>
        <div class="chat-layout">
            <div class="contact-list" id="contact-list"></div>
            <div class="flex-1 flex flex-col">
                <h2 id="chat-title" class="text-5xl font-light mb-10 opacity-40">Выберите контакт</h2>
                <div class="msg-area" id="msg-area"></div>
                <div class="flex gap-4 mt-8">
                    <input type="text" id="msg-input" class="win-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button class="win-btn" onclick="sendMsg()">отправить</button>
                </div>
            </div>
        </div>
    </div>

    <div class="charms" id="charms">
        <div class="charm" onclick="navigate('start')">
            <svg width="40" height="40" fill="currentColor" viewBox="0 0 24 24"><path d="M2,12L12,2L22,12H18V22H12V18H10V22H6V12H2Z"/></svg>
            <p class="text-[10px] mt-1 font-bold uppercase">MMessage</p>
        </div>
        <div class="charm" onclick="toggleSidebar('side-search', true)">
            <svg width="40" height="40" fill="currentColor" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
            <p class="text-[10px] mt-1 font-bold uppercase">Поиск</p>
        </div>
        <div class="charm" onclick="toggleSidebar('side-settings', true)">
            <svg width="40" height="40" fill="currentColor" viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.68 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
            <p class="text-[10px] mt-1 font-bold uppercase">Параметры</p>
        </div>
    </div>

    <div class="overlay" id="side-search">
        <div class="back-btn" onclick="toggleSidebar('side-search', false)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M15 19l-7-7 7-7"/></svg>
        </div>
        <h2 class="text-4xl font-light mb-10 uppercase tracking-tighter">Поиск</h2>
        <div class="sw-row">
            <p class="sw-label">Введите ID пользователя</p>
            <input type="text" id="search-input" class="win-input mb-4" placeholder="Напр. abc-123-def">
            <button class="win-btn w-full" onclick="searchUser()">Найти и написать</button>
            <p id="search-error" class="text-red-500 text-sm mt-2 hidden"></p>
        </div>
    </div>

    <div class="overlay" id="side-settings">
        <div class="back-btn" onclick="toggleSidebar('side-settings', false)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M15 19l-7-7 7-7"/></svg>
        </div>
        <h2 class="text-4xl font-light mb-10 uppercase tracking-tighter">Параметры</h2>
        <div class="mb-10">
            <p class="sw-label">Ваш идентификатор</p>
            <div class="flex flex-col gap-2">
                <p id="my-id" class="text-sm break-all opacity-80 text-teal-400 font-bold">...</p>
                <p id="copy-btn" class="text-xs font-bold cursor-pointer hover:text-white transition-colors" onclick="copyId()">КОПИРОВАТЬ</p>
            </div>
        </div>
        <div class="sw-row">
            <p class="sw-label">Персонализация</p>
            <div class="sw-control disabled">
                <div class="sw-track active"><div class="sw-thumb"></div></div>
                <span class="sw-label !text-white !opacity-100 mt-2">Упрощенная версия</span>
            </div>
        </div>
        <div class="sw-row">
            <p class="sw-label">Интерфейс</p>
            <div id="anim-toggle" onclick="toggleAnim()">
                <div class="sw-track active"><div class="sw-thumb"></div></div>
                <span class="sw-label !text-white !opacity-100 mt-2">Анимированные плитки</span>
            </div>
        </div>
    </div>

</body>
</html>
