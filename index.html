<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pnavkv2 - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; margin: 0; overflow: hidden; }
        .sidebar { width: 350px; min-width: 350px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; background: #fff; height: 100vh; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; height: 100vh; position: relative; }
        
        /* Фикс для предотвращения смещения кнопки создания */
        .header-controls { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
        
        #searchContainer { display: flex; align-items: center; background: #f1f5f9; border-radius: 10px; width: 34px; height: 34px; overflow: hidden; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; flex-shrink: 0; }
        #searchContainer.expanded { width: 180px; cursor: default; }
        #searchInput { width: 0; opacity: 0; background: transparent; border: none; outline: none; padding-left: 6px; font-size: 13px; transition: width 0.3s, opacity 0.2s; }
        #searchContainer.expanded #searchInput { width: 140px; opacity: 1; }
        
        .btn-square { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 10px; transition: all 0.2s; flex-shrink: 0; }
        .chat-item { transition: all 0.2s; cursor: pointer; border-radius: 12px; margin: 4px 8px; padding: 12px; display: flex; align-items: center; gap: 12px; }
        .chat-item:hover { background: #f8fafc; }
        .chat-item.active { background: #eff6ff; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #7c4dff; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .message-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; margin-bottom: 8px; position: relative; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0,0,0,0.06); word-wrap: break-word; }
        .msg-in { background: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-out { background: #effdde; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 11px; color: #6a737d; margin-top: 4px; }
        .custom-alert { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
        #messagesArea { scroll-behavior: smooth; background: #e5ddd5; background-image: radial-gradient(#d1d1d1 1px, transparent 0); background-size: 20px 20px; }
        .auth-screen { position: fixed; inset: 0; background: #f4f7fa; z-index: 200; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <!-- Экран Аутентификации -->
    <div id="authScreen" class="auth-screen">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-2">pnavkv2</h1>
            <p class="text-gray-400 text-center mb-8" id="authSubtitle">Вход или Регистрация</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-gray-400 uppercase ml-1">Username</label>
                    <input type="text" id="authUsername" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-blue-500" placeholder="От 4 до 12 символов">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-400 uppercase ml-1">Password</label>
                    <input type="password" id="authPassword" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-blue-500" placeholder="Ваш пароль">
                </div>
                
                <button id="mainAuthBtn" onclick="handleAuth()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition-all mt-4">
                    Войти / Создать
                </button>
            </div>
            <p class="text-[11px] text-gray-400 mt-6 text-center">
                Только латинские буквы, цифры (не в начале) и символ "_"
            </p>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <aside class="sidebar" id="appSidebar" style="display:none;">
        <div class="p-4 flex items-center justify-between">
            <h2 class="text-xl font-bold text-gray-800 flex-shrink-0">Чаты</h2>
            <div class="header-controls">
                <div id="searchContainer" onclick="expandSearch()">
                    <div class="p-1.5 text-gray-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="Поиск..." oninput="renderChannels()">
                </div>
                <button onclick="openCreateModal()" class="btn-square bg-blue-600 text-white hover:bg-blue-700 shadow-sm shadow-blue-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" stroke-linecap="round"></path></svg>
                </button>
            </div>
        </div>
        <div id="channelList" class="flex-1 overflow-y-auto"></div>
        <div class="p-4 border-t bg-gray-50 flex items-center justify-between">
            <span id="myUsername" class="font-medium text-sm text-gray-600">@user</span>
            <button onclick="logout()" class="text-xs text-red-500 font-bold">Выйти</button>
        </div>
    </aside>

    <main class="main-content flex flex-col" id="chatView" style="display:none;">
        <div id="noChannelView" class="flex-1 flex flex-col items-center justify-center text-gray-400 text-center p-10">
            <div class="bg-white p-8 rounded-full mb-6 shadow-sm">
                <svg class="w-16 h-16 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-width="2"></path></svg>
            </div>
            <p class="text-lg font-medium text-gray-500">Выберите чат</p>
        </div>

        <div id="activeChannelContent" class="hidden flex-1 flex flex-col h-full overflow-hidden">
            <header class="bg-white h-[64px] px-4 border-b flex items-center justify-between flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div id="headerAvatar" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold">?</div>
                    <div>
                        <h3 id="headerTitle" class="font-bold text-gray-800 leading-tight">Название</h3>
                        <p id="headerMeta" class="text-xs text-gray-400">@link</p>
                    </div>
                </div>
            </header>
            <div id="messagesArea" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>
            <footer class="bg-white p-3 flex items-center gap-3 border-t flex-shrink-0">
                <input type="text" id="msgInput" placeholder="Написать..." class="flex-1 bg-gray-50 border-none outline-none p-3 rounded-2xl text-[15px] focus:bg-white focus:ring-1 focus:ring-blue-100 transition-all">
                <button onclick="sendMessage()" class="w-10 h-10 flex items-center justify-center text-blue-600 hover:bg-blue-50 rounded-full">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </footer>
        </div>
    </main>

    <div id="createModal" class="modal-overlay" style="display:none;" onclick="if(event.target === this) closeCreateModal()">
        <div class="bg-white p-6 rounded-3xl w-full max-w-[400px] shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-gray-800">Новый чат</h2>
            <div class="space-y-4">
                <input type="text" id="newName" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" placeholder="Название">
                <input type="text" id="newId" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" placeholder="ID (без @)">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeCreateModal()" class="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-100 rounded-xl">Отмена</button>
                    <button onclick="confirmCreate()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-100">Создать</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="custom-alert"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Твой новый конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBAFGyrgliehm-cfJG91QkQRvUGACPP8rA",
            authDomain: "elytrwcloud.firebaseapp.com",
            databaseURL: "https://elytrwcloud-default-rtdb.firebaseio.com",
            projectId: "elytrwcloud",
            storageBucket: "elytrwcloud.firebasestorage.app",
            messagingSenderId: "816418199024",
            appId: "1:816418199024:web:bed697795dea9cdec03935"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pnavkv2-custom';

        let currentUser = null;
        let channels = [];
        let activeId = null;
        let messagesUnsubscribe = null;

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const savedUsername = localStorage.getItem('pnavkv2_logged_user');
                if (savedUsername) await loginAs(savedUsername);
            } else {
                showAuthScreen();
            }
        });

        window.handleAuth = async () => {
            const username = document.getElementById('authUsername').value.trim().toLowerCase();
            const password = document.getElementById('authPassword').value;

            if (!/^[a-z][a-z0-9_]{3,11}$/.test(username)) {
                return showToast("Ошибка: 4-12 симв, латиница, цифры не в начале");
            }
            if (password.length < 4) return showToast("Слишком короткий пароль");

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', username);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                if (userSnap.data().password === password) {
                    await loginAs(username);
                } else {
                    showToast("Неверный пароль или имя занято");
                }
            } else {
                await setDoc(userRef, { username, password, createdAt: serverTimestamp() });
                await loginAs(username);
                showToast("Аккаунт создан!");
            }
        };

        async function loginAs(username) {
            currentUser = username;
            localStorage.setItem('pnavkv2_logged_user', username);
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appSidebar').style.display = 'flex';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('myUsername').textContent = '@' + username;
            startSync();
        }

        window.logout = () => {
            localStorage.removeItem('pnavkv2_logged_user');
            location.reload();
        };

        function showAuthScreen() {
            document.getElementById('authScreen').style.display = 'flex';
        }

        function startSync() {
            const channelsQuery = collection(db, 'artifacts', appId, 'public', 'data', 'channels');
            onSnapshot(channelsQuery, (snapshot) => {
                channels = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderChannels();
            });
        }

        window.renderChannels = () => {
            const list = document.getElementById('channelList');
            const queryVal = document.getElementById('searchInput').value.toLowerCase().trim();
            list.innerHTML = '';
            
            const filtered = channels.filter(c => 
                c.link.includes(queryVal) || c.name.toLowerCase().includes(queryVal)
            );

            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = `chat-item ${activeId === c.id ? 'active' : ''}`;
                div.onclick = () => selectChannel(c.id);
                div.innerHTML = `
                    <div class="avatar" style="background:${getHashColor(c.name)}">${c.name[0]}</div>
                    <div class="flex-1 overflow-hidden">
                        <span class="font-bold text-gray-900 truncate">${c.name}</span>
                        <p class="text-xs text-gray-400">@${c.link}</p>
                    </div>
                `;
                list.appendChild(div);
            });
        };

        window.selectChannel = (id) => {
            if (messagesUnsubscribe) messagesUnsubscribe();
            activeId = id;
            const c = channels.find(x => x.id === id);
            
            document.getElementById('noChannelView').classList.add('hidden');
            document.getElementById('activeChannelContent').classList.remove('hidden');
            document.getElementById('headerTitle').textContent = c.name;
            document.getElementById('headerAvatar').textContent = c.name[0];
            document.getElementById('headerAvatar').style.background = getHashColor(c.name);
            document.getElementById('headerMeta').textContent = "@" + c.link;

            const msgsQuery = collection(db, 'artifacts', appId, 'public', 'data', 'channels', id, 'messages');
            messagesUnsubscribe = onSnapshot(msgsQuery, (snapshot) => {
                const msgs = snapshot.docs
                    .map(doc => doc.data())
                    .sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                renderMessages(msgs);
            });
            renderChannels();
        };

        function renderMessages(msgs) {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            msgs.forEach(m => {
                const isOut = m.sender === currentUser;
                const time = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...';
                const div = document.createElement('div');
                div.className = `message-bubble ${isOut ? 'msg-out' : 'msg-in'}`;
                div.innerHTML = `
                    <div class="text-[11px] font-bold ${isOut ? 'text-blue-500' : 'text-purple-500'} mb-1">${m.sender}</div>
                    <div>${m.text.replace(/\n/g, '<br>')}</div>
                    <div class="msg-footer"><span>${time}</span></div>
                `;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !activeId || !currentUser) return;

            const msgData = {
                text,
                sender: currentUser,
                timestamp: serverTimestamp()
            };
            
            input.value = '';
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'channels', activeId, 'messages'), msgData);
        };

        window.confirmCreate = async () => {
            const name = document.getElementById('newName').value.trim();
            const link = document.getElementById('newId').value.trim().toLowerCase().replace('@','');
            
            if(!name || !link) return showToast("Заполните поля");
            if(channels.some(c => c.link === link)) return showToast("ID занят");

            const newChannel = { name, link, owner: currentUser, createdAt: serverTimestamp() };
            const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'channels'), newChannel);
            
            closeCreateModal();
            selectChannel(docRef.id);
        };

        window.showToast = (text) => {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        };
        window.expandSearch = () => {
            document.getElementById('searchContainer').classList.add('expanded');
            setTimeout(() => document.getElementById('searchInput').focus(), 100);
        };
        window.openCreateModal = () => document.getElementById('createModal').style.display = 'flex';
        window.closeCreateModal = () => document.getElementById('createModal').style.display = 'none';
        function getHashColor(str) {
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
