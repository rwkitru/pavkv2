<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pnavkv2demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Mobile Layout Logic */
        .sidebar { width: 350px; min-width: 350px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; background: #fff; height: 100vh; transition: transform 0.3s ease; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; height: 100vh; position: relative; width: 100%; }
        
        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; min-width: 100%; z-index: 50; }
            .sidebar.hidden-mobile { transform: translateX(-100%); }
            .main-content { width: 100vw; }
        }

        .chat-item { transition: all 0.2s; cursor: pointer; border-radius: 12px; margin: 4px 8px; padding: 12px; display: flex; align-items: center; gap: 12px; }
        .chat-item:hover { background: #f8fafc; }
        .chat-item.active { background: #eff6ff; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
        
        .message-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; margin-bottom: 8px; background: #fff; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); position: relative; }
        #messagesArea { scroll-behavior: smooth; background: #e5ddd5; background-image: radial-gradient(#d1d1d1 1px, transparent 0); background-size: 20px 20px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); padding: 20px; }
        .custom-alert { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; width: auto; max-width: 90vw; text-align: center; }
        
        #searchContainer { display: flex; align-items: center; background: #f1f5f9; border-radius: 10px; width: 40px; height: 40px; overflow: hidden; transition: width 0.3s; cursor: pointer; }
        #searchContainer.expanded { width: 180px; }
        #searchInput { width: 0; opacity: 0; background: transparent; border: none; outline: none; padding-left: 8px; font-size: 14px; transition: width 0.3s, opacity 0.2s; }
        #searchContainer.expanded #searchInput { width: 140px; opacity: 1; }

        /* Smooth inputs for mobile */
        input { font-size: 16px !important; } 
    </style>
</head>
<body class="flex">

    <!-- Экран авторизации -->
    <div id="authScreen" class="fixed inset-0 bg-[#f4f7fa] z-[200] flex items-center justify-center p-4">
        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-2" id="authTitle">Регистрация</h1>
            <p class="text-gray-400 text-center mb-8 text-sm" id="authSubtitle">Создайте аккаунт pnavkv2</p>
            <div class="space-y-4">
                <input type="text" id="authUsername" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none" placeholder="Никнейм (4-12 симв)">
                <input type="password" id="authPassword" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none" placeholder="Пароль">
                <button onclick="handleAuth()" id="mainAuthBtn" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all active:scale-95">
                    <span id="authBtnText">Зарегистрироваться</span>
                </button>
            </div>
            <div class="mt-6 text-center">
                <button onclick="toggleAuthMode()" id="toggleAuthBtn" class="text-blue-600 font-semibold text-sm">Уже есть аккаунт? Войти</button>
            </div>
        </div>
    </div>

    <!-- Боковая панель -->
    <aside class="sidebar" id="appSidebar" style="display:none;">
        <div class="p-4 flex items-center justify-between">
            <h2 class="text-xl font-bold">Каналы</h2>
            <div class="flex gap-2">
                <div id="searchContainer" onclick="this.classList.add('expanded'); document.getElementById('searchInput').focus();">
                    <div class="p-2 text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg></div>
                    <input type="text" id="searchInput" placeholder="Поиск..." oninput="renderChannels()">
                </div>
                <button onclick="openCreateModal()" class="w-10 h-10 flex items-center justify-center bg-blue-600 text-white rounded-xl shadow-md active:scale-90 transition-transform"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5"></path></svg></button>
            </div>
        </div>
        <div id="channelList" class="flex-1 overflow-y-auto"></div>
        <div class="p-4 border-t bg-gray-50 flex items-center justify-center">
            <span id="myUsername" class="font-bold text-sm text-gray-500">@user</span>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="main-content" id="chatView" style="display:none;">
        <div id="noChannelView" class="flex-1 flex flex-col items-center justify-center text-gray-400">
            <div class="bg-white p-6 rounded-full mb-4 shadow-sm">
                <svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
            </div>
            <p>Выберите канал для общения</p>
        </div>

        <div id="activeChannelContent" class="hidden flex-1 flex flex-col h-full overflow-hidden">
            <header class="bg-white h-[64px] px-3 md:px-4 border-b flex items-center justify-between shadow-sm z-10">
                <div class="flex items-center gap-2 md:gap-3 flex-1 min-width-0">
                    <!-- Кнопка назад для мобилок -->
                    <button onclick="goBack()" class="md:hidden p-2 text-gray-500 active:bg-gray-100 rounded-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5"></path></svg>
                    </button>
                    <div class="flex items-center gap-2 cursor-pointer overflow-hidden" onclick="openChannelProfile()">
                        <div id="headerAvatar" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold flex-shrink-0">?</div>
                        <div class="min-width-0">
                            <h3 id="headerTitle" class="font-bold text-gray-800 leading-tight truncate text-sm md:text-base">Название</h3>
                            <div class="flex items-center gap-2">
                                <p id="headerMeta" class="text-[10px] md:text-xs text-blue-500 truncate">@link</p>
                                <span class="text-[10px] text-gray-300">•</span>
                                <p id="headerSubsCount" class="text-[10px] text-gray-400">0 подписчиков</p>
                            </div>
                        </div>
                    </div>
                </div>
                <button id="editChannelBtn" onclick="openEditModal()" class="hidden text-[10px] md:text-xs bg-gray-100 px-3 py-1.5 rounded-lg font-bold text-gray-600 active:bg-gray-200">Ред.</button>
            </header>
            
            <div id="messagesArea" class="flex-1 overflow-y-auto p-3 md:p-4 flex flex-col"></div>
            
            <footer id="chatFooter" class="bg-white p-3 border-t pb-safe">
                <div id="ownerControls" class="hidden flex items-center gap-2">
                    <input type="text" id="msgInput" placeholder="Опубликовать пост..." class="flex-1 bg-gray-50 p-3 md:p-4 rounded-2xl outline-none text-sm">
                    <button onclick="sendMessage()" class="text-blue-600 p-2 active:scale-90 transition-transform"><svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
                </div>
                <div id="subscriberControls" class="hidden flex items-center justify-center py-1">
                    <button id="joinBtn" onclick="toggleJoin()" class="w-full md:w-auto bg-blue-600 text-white px-8 py-3 rounded-xl font-bold active:bg-blue-700 transition-colors">Вступить</button>
                    <p id="joinedLabel" class="hidden text-gray-400 text-sm font-medium py-2">Вы подписаны</p>
                </div>
            </footer>
        </div>
    </main>

    <!-- Модальные окна -->
    <div id="channelModal" class="modal-overlay" style="display:none;" onclick="if(event.target === this) closeChannelModal()">
        <div class="bg-white p-6 rounded-3xl w-full max-w-[400px]">
            <h2 id="modalTitle" class="text-xl font-bold mb-6">Канал</h2>
            <div class="space-y-4">
                <input type="text" id="channelNameInput" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none" placeholder="Название">
                <input type="text" id="channelIdInput" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none" placeholder="Ссылка (id)">
                <div class="flex gap-3 pt-2">
                    <button onclick="closeChannelModal()" class="flex-1 py-4 text-gray-500 font-bold active:bg-gray-50 rounded-xl">Отмена</button>
                    <button onclick="saveChannel()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold active:bg-blue-700">ОК</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay" style="display:none;" onclick="if(event.target === this) this.style.display='none'">
        <div class="bg-white p-8 rounded-3xl w-full max-w-[350px] text-center">
            <div id="profAvatar" class="w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl text-white font-bold">?</div>
            <h2 id="profName" class="text-xl font-bold">Имя</h2>
            <p id="profId" class="text-blue-500 mb-4">@id</p>
            <div class="text-left border-t pt-4 space-y-2">
                <p id="profOwner" class="text-sm">Владелец: @user</p>
                <p id="profStats" class="text-sm font-semibold text-gray-700">Подписчиков: 0</p>
            </div>
            <button onclick="document.getElementById('profileModal').style.display='none'" class="mt-6 w-full py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">Закрыть</button>
        </div>
    </div>

    <div id="toast" class="custom-alert"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, serverTimestamp, arrayUnion, query, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAFGyrgliehm-cfJG91QkQRvUGACPP8rA",
            authDomain: "elytrwcloud.firebaseapp.com",
            projectId: "elytrwcloud",
            storageBucket: "elytrwcloud.firebasestorage.app",
            messagingSenderId: "816418199024",
            appId: "1:816418199024:web:bed697795dea9cdec03935"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ROOT = "pnavkv2_final";

        let user = null;
        let channels = [];
        let mySubs = [];
        let activeId = null;
        let authMode = 'register';
        let isEdit = false;

        const sessionViewed = new Set();
        const VIEW_COOLDOWN = 5 * 60 * 1000;

        const savedUser = localStorage.getItem('pnavkv2_user');
        if (savedUser) loginAs(savedUser);
        signInAnonymously(auth);

        window.toggleAuthMode = () => {
            authMode = authMode === 'register' ? 'login' : 'register';
            document.getElementById('authTitle').textContent = authMode === 'login' ? 'Вход' : 'Регистрация';
            document.getElementById('authBtnText').textContent = authMode === 'login' ? 'Войти' : 'Зарегистрироваться';
        };

        window.handleAuth = async () => {
            const name = document.getElementById('authUsername').value.trim().toLowerCase();
            const pass = document.getElementById('authPassword').value;
            if (name.length < 4) return showToast("Минимум 4 символа");
            
            const uRef = doc(db, ROOT, "users", "list", name);
            const snap = await getDoc(uRef);
            if (authMode === 'register') {
                if (snap.exists()) return showToast("Ник занят");
                await setDoc(uRef, { username: name, password: pass, subs: [] });
                loginAs(name);
            } else {
                if (!snap.exists() || snap.data().password !== pass) return showToast("Ошибка входа");
                loginAs(name);
            }
        };

        function loginAs(name) {
            user = name;
            localStorage.setItem('pnavkv2_user', name);
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appSidebar').style.display = 'flex';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('myUsername').textContent = '@' + name;
            
            onSnapshot(doc(db, ROOT, "users", "list", name), (s) => {
                if(s.exists()) { mySubs = s.data().subs || []; renderChannels(); }
            });

            onSnapshot(collection(db, ROOT, "channels", "list"), (s) => {
                channels = s.docs.map(d => ({ id: d.id, ...d.data() }));
                renderChannels();
                if (activeId) updateChannelUI();
            });
        }

        window.renderChannels = () => {
            const list = document.getElementById('channelList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = '';
            channels.filter(c => {
                if (search) return c.name.toLowerCase().includes(search) || c.link.includes(search);
                return c.owner === user || mySubs.includes(c.id);
            }).forEach(c => {
                const div = document.createElement('div');
                div.className = `chat-item ${activeId === c.id ? 'active' : ''}`;
                div.onclick = () => selectChannel(c.id);
                div.innerHTML = `<div class="avatar" style="background:${getHashColor(c.name)}">${c.name[0]}</div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold truncate">${c.name}</div>
                        <p class="text-xs text-gray-400">@${c.link}</p>
                    </div>`;
                list.appendChild(div);
            });
        };

        window.selectChannel = (id) => {
            activeId = id;
            updateChannelUI();
            
            // Mobile: hide sidebar when channel selected
            if (window.innerWidth <= 768) {
                document.getElementById('appSidebar').classList.add('hidden-mobile');
            }

            if (window.msgUnsub) window.msgUnsub();
            window.msgUnsub = onSnapshot(collection(db, ROOT, "channels", "list", id, "messages"), (s) => {
                const msgs = s.docs.map(d => ({msgId: d.id, ...d.data()})).sort((a,b) => (a.time?.seconds||0)-(b.time?.seconds||0));
                renderMessages(msgs);
                msgs.forEach(m => processView(id, m.msgId, m.sender));
            });
            renderChannels();
        };

        window.goBack = () => {
            document.getElementById('appSidebar').classList.remove('hidden-mobile');
        };

        async function processView(channelId, msgId, sender) {
            if (sender === user) return; 
            if (sessionViewed.has(msgId)) return;

            const storageKey = `pv_${user}_${msgId}`;
            const lastView = localStorage.getItem(storageKey);
            const now = Date.now();

            if (!lastView || (now - parseInt(lastView)) > VIEW_COOLDOWN) {
                sessionViewed.add(msgId);
                try {
                    const mRef = doc(db, ROOT, "channels", "list", channelId, "messages", msgId);
                    await updateDoc(mRef, { views: increment(1) });
                    localStorage.setItem(storageKey, now.toString());
                } catch (e) { console.error(e); }
            }
        }

        function renderMessages(msgs) {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            msgs.forEach(m => {
                const timeStr = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
                const div = document.createElement('div');
                div.className = 'message-bubble';
                div.innerHTML = `
                    <div class="text-[10px] font-bold text-blue-600 mb-1">${m.sender}</div>
                    <div class="text-gray-800 break-words font-medium">${m.text}</div>
                    <div class="flex items-center justify-end gap-2 mt-1">
                        <div class="flex items-center gap-1 text-[10px] text-gray-400">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2"></path></svg>
                            <span>${m.views || 1}</span>
                        </div>
                        <div class="text-[9px] text-gray-400">${timeStr}</div>
                    </div>
                `;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !activeId) return;
            input.value = '';
            await addDoc(collection(db, ROOT, "channels", "list", activeId, "messages"), {
                text, sender: user, time: serverTimestamp(), views: 1
            });
        };

        window.saveChannel = async () => {
            const name = document.getElementById('channelNameInput').value.trim();
            const link = document.getElementById('channelIdInput').value.trim().toLowerCase();
            if (!name || !link) return;
            if (isEdit) {
                await updateDoc(doc(db, ROOT, "channels", "list", activeId), { name });
            } else {
                const snap = await getDocs(query(collection(db, ROOT, "channels", "list"), where("link", "==", link)));
                if (!snap.empty) return showToast("Ссылка занята");
                const ref = await addDoc(collection(db, ROOT, "channels", "list"), { 
                    name, link, owner: user, subscribers: [user] 
                });
                await updateDoc(doc(db, ROOT, "users", "list", user), { subs: arrayUnion(ref.id) });
                selectChannel(ref.id);
            }
            closeChannelModal();
        };

        function updateChannelUI() {
            const c = channels.find(x => x.id === activeId);
            if (!c) return;
            document.getElementById('noChannelView').classList.add('hidden');
            document.getElementById('activeChannelContent').classList.remove('hidden');
            document.getElementById('headerTitle').textContent = c.name;
            document.getElementById('headerMeta').textContent = "@" + c.link;
            document.getElementById('headerAvatar').textContent = c.name[0];
            document.getElementById('headerAvatar').style.background = getHashColor(c.name);
            
            const subsCount = c.subscribers ? c.subscribers.length : 0;
            document.getElementById('headerSubsCount').textContent = `${subsCount} подписчиков`;

            const isOwner = c.owner === user;
            document.getElementById('editChannelBtn').classList.toggle('hidden', !isOwner);
            document.getElementById('ownerControls').classList.toggle('hidden', !isOwner);
            document.getElementById('subscriberControls').classList.toggle('hidden', isOwner);
            if (!isOwner) {
                const subbed = mySubs.includes(activeId);
                document.getElementById('joinBtn').classList.toggle('hidden', subbed);
                document.getElementById('joinedLabel').classList.toggle('hidden', !subbed);
            }
        }

        window.toggleJoin = async () => {
            if (!activeId || !user) return;
            await updateDoc(doc(db, ROOT, "users", "list", user), { subs: arrayUnion(activeId) });
            await updateDoc(doc(db, ROOT, "channels", "list", activeId), { subscribers: arrayUnion(user) });
            showToast("Вы вступили в канал!");
        };

        window.openCreateModal = () => { isEdit = false; document.getElementById('channelModal').style.display='flex'; };
        window.openEditModal = () => { isEdit = true; document.getElementById('channelModal').style.display='flex'; };
        window.closeChannelModal = () => document.getElementById('channelModal').style.display='none';
        
        window.openChannelProfile = () => { 
            const c = channels.find(x => x.id === activeId);
            if (!c) return;
            document.getElementById('profName').textContent = c.name;
            document.getElementById('profId').textContent = "@" + c.link;
            document.getElementById('profOwner').textContent = "Владелец: @" + c.owner;
            document.getElementById('profStats').textContent = `Подписчиков: ${c.subscribers ? c.subscribers.length : 0}`;
            document.getElementById('profAvatar').style.background = getHashColor(c.name);
            document.getElementById('profAvatar').textContent = c.name[0];
            document.getElementById('profileModal').style.display = 'flex'; 
        };

        function showToast(t) { const el = document.getElementById('toast'); el.textContent = t; el.style.opacity = '1'; setTimeout(()=>el.style.opacity='0', 3000); }
        function getHashColor(s) { const c = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4']; let h = 0; for(let i=0; i<s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h); return c[Math.abs(h) % c.length]; }
        document.getElementById('msgInput').addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
    </script>
</body>
</html>
