<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMessage - Realtime Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6Hvab6lzHHsAdbBa3HQW-hIOtLSkjiWM",
            authDomain: "mmetroui.firebaseapp.com",
            projectId: "mmetroui",
            storageBucket: "mmetroui.firebasestorage.app",
            messagingSenderId: "587581879577",
            appId: "1:587581879577:web:547926c31ad6c7e0758188"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let selectedContactId = null;
        let contacts = [];
        let unsubMessages = null;

        const myIdDisplay = document.getElementById('my-id-display');

        const updateStatus = (text, isError = false) => {
            myIdDisplay.innerText = text;
            myIdDisplay.className = `mb-6 text-sm font-mono ${isError ? 'text-red-400' : 'opacity-50'}`;
        };

        // Вход
        const init = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                updateStatus("Ошибка входа: проверьте вкладку Authentication в Firebase", true);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                updateStatus(`Ваш ID: ${user.uid}`);
                
                try {
                    // Используем плоскую структуру для надежности с вашими правилами
                    await setDoc(doc(db, 'users', user.uid), {
                        uid: user.uid,
                        lastSeen: serverTimestamp(),
                        name: `User_${user.uid.substring(0, 4)}`
                    }, { merge: true });
                    listenToContacts();
                } catch (e) {
                    updateStatus("Ошибка Firestore: проверьте вкладку Rules", true);
                    console.error(e);
                }
            }
        });

        function listenToContacts() {
            onSnapshot(collection(db, 'users'), (snapshot) => {
                contacts = snapshot.docs
                    .map(doc => doc.data())
                    .filter(u => u.uid !== currentUser?.uid);
                renderContacts();
            }, (err) => console.error("Contacts error:", err));
        }

        function listenToMessages(otherId) {
            if (unsubMessages) unsubMessages();
            const chatId = [currentUser.uid, otherId].sort().join('_');
            const q = collection(db, 'chats', chatId, 'messages');
            
            unsubMessages = onSnapshot(q, (snapshot) => {
                const msgs = snapshot.docs
                    .map(doc => doc.data())
                    .sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                renderMessages(msgs);
            });
        }

        window.navigateTo = (view, contactId = null) => {
            const mainView = document.getElementById('main-view');
            mainView.style.transform = view === 'start' ? 'translateX(0)' : 'translateX(-100vw)';
            if (contactId) selectContact(contactId);
            toggleCharms(false);
            toggleSearch(false);
        };

        function renderContacts() {
            const list = document.getElementById('contact-list');
            list.innerHTML = contacts.map(c => `
                <div class="contact-item ${selectedContactId === c.uid ? 'active' : ''}" onclick="window.selectContact('${c.uid}')">
                    <div class="avatar" style="background-color: #2d89ef"></div>
                    <div>
                        <div class="font-semibold text-lg">${c.name}</div>
                        <div class="text-xs opacity-50 font-mono">${c.uid}</div>
                    </div>
                </div>
            `).join('');
        }

        window.selectContact = (uid) => {
            selectedContactId = uid;
            const contact = contacts.find(c => c.uid === uid) || { name: `Пользователь ...${uid.slice(-4)}` };
            document.getElementById('current-chat-name').innerText = contact.name;
            renderContacts();
            listenToMessages(uid);
        };

        function renderMessages(msgs) {
            const area = document.getElementById('messages-area');
            area.innerHTML = msgs.map(m => `
                <div class="message ${m.senderId === currentUser.uid ? 'sent' : 'received'}">
                    ${m.text}
                </div>
            `).join('');
            area.scrollTop = area.scrollHeight;
        }

        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !selectedContactId) return;

            const chatId = [currentUser.uid, selectedContactId].sort().join('_');
            input.value = '';
            try {
                await addDoc(collection(db, 'chats', chatId, 'messages'), {
                    text, senderId: currentUser.uid, timestamp: serverTimestamp()
                });
            } catch (e) { alert("Ошибка отправки. Проверьте правила БД."); }
        };

        window.performSearch = async () => {
            const id = document.getElementById('search-input').value.trim();
            if (!id) return;
            try {
                const userDoc = await getDoc(doc(db, 'users', id));
                if (userDoc.exists()) navigateTo('messenger', id);
                else alert("ID не найден.");
            } catch (e) { alert("Ошибка доступа при поиске."); }
        };

        window.toggleCharms = (s) => document.getElementById('charms-bar').classList.toggle('active', s);
        window.toggleSearch = (s) => {
            document.getElementById('search-overlay').classList.toggle('active', s);
            if(s) document.getElementById('search-input').focus();
        };

        document.addEventListener('mousemove', (e) => {
            if (e.clientX > window.innerWidth - 10) toggleCharms(true);
            if (e.clientX < window.innerWidth - 100 && !document.getElementById('search-overlay').classList.contains('active')) toggleCharms(false);
        });

        init();
    </script>
    <style>
        :root { --win-purple: #7e3878; --win-dark-blue: #2d89ef; --bg-color: #004687; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: white; overflow: hidden; margin: 0; height: 100vh; }
        .metro-bg { position: fixed; inset: 0; background: linear-gradient(135deg, #004687 0%, #002d54 100%); z-index: -1; }
        .view-container { display: flex; transition: transform 0.6s cubic-bezier(0.1, 0.7, 0.1, 1); height: 100vh; width: 200vw; }
        .page { width: 100vw; height: 100vh; padding: 60px 100px; box-sizing: border-box; overflow-y: auto; }
        h1 { font-weight: 300; font-size: 64px; margin-bottom: 50px; }
        .tiles-grid { display: grid; grid-template-columns: repeat(auto-fill, 160px); grid-auto-rows: 160px; gap: 12px; }
        .tile { background: var(--win-dark-blue); padding: 15px; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; transition: transform 0.1s; }
        .tile:active { transform: scale(0.95); }
        .tile.wide { grid-column: span 2; }
        .chat-layout { display: flex; height: calc(100vh - 250px); }
        .contact-list { width: 350px; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; }
        .contact-item { padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .contact-item.active { background: var(--win-dark-blue); }
        .chat-main { flex: 1; display: flex; flex-direction: column; padding: 0 50px; }
        .messages-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .message { max-width: 80%; padding: 10px 15px; font-size: 18px; }
        .message.received { align-self: flex-start; background: rgba(255,255,255,0.1); }
        .message.sent { align-self: flex-end; background: var(--win-purple); }
        input[type="text"] { background: white; border: none; padding: 12px 15px; color: black; font-size: 18px; width: 100%; outline: none; }
        .win-btn { background: #333; color: white; border: 2px solid white; padding: 8px 30px; cursor: pointer; }
        .charms-bar { position: fixed; right: -100px; top: 0; height: 100vh; width: 90px; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; z-index: 1000; transition: right 0.3s; }
        .charms-bar.active { right: 0; }
        .charm-icon { color: #888; cursor: pointer; font-size: 11px; text-align: center; }
        .charm-icon:hover { color: white; }
        #search-overlay { position: fixed; top: 0; right: -400px; width: 380px; height: 100vh; background: #1f1f1f; z-index: 1001; padding: 60px 40px; transition: right 0.4s; }
        #search-overlay.active { right: 0; }
        .back-circle { width: 45px; height: 45px; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div class="metro-bg"></div>
    <div class="view-container" id="main-view">
        <div class="page">
            <div class="flex justify-between items-end">
                <h1>MMessage</h1>
                <div id="my-id-display">Подключение...</div>
            </div>
            <div class="tiles-grid">
                <div class="tile wide" style="background: var(--win-purple)" onclick="navigateTo('messenger')">
                    <svg class="w-10 h-10 mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z"/></svg>
                    <div class="text-sm">Сообщения</div>
                </div>
                <div class="tile" style="background: #008a00" onclick="toggleSearch(true)">
                    <svg class="w-10 h-10 mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                    <div class="text-sm">Поиск</div>
                </div>
            </div>
        </div>
        <div class="page">
            <div class="flex items-center mb-10">
                <div class="back-circle mr-6" onclick="navigateTo('start')">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
                </div>
                <h1>Чат</h1>
            </div>
            <div class="chat-layout">
                <div class="contact-list" id="contact-list"></div>
                <div class="chat-main">
                    <h2 id="current-chat-name" class="text-4xl font-light mb-8">Выберите контакт</h2>
                    <div class="messages-area" id="messages-area"></div>
                    <div class="flex gap-4">
                        <input type="text" id="message-input" placeholder="Введите текст..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="win-btn" onclick="sendMessage()">отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="charms-bar" id="charms-bar">
        <div class="charm-icon" onclick="toggleSearch(true)"><svg class="w-8 h-8 mx-auto mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>Поиск</div>
        <div class="charm-icon" onclick="navigateTo('start')"><svg class="w-8 h-8 mx-auto mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M2,12L12,2L22,12H18V22H12V18H10V22H6V12H2Z"/></svg>MMessage</div>
    </div>
    <div id="search-overlay">
        <h2 class="text-4xl font-light mb-10">Поиск по ID</h2>
        <input type="text" id="search-input" placeholder="ID пользователя..." class="mb-4">
        <button class="win-btn" onclick="performSearch()">найти</button>
    </div>
</body>
</html>
